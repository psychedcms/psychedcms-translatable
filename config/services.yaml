services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Translation Validator
    PsychedCms\Translatable\Translation\TranslationValidator: ~

    # Locale Listener
    PsychedCms\Translatable\EventListener\LocaleListener:
        arguments:
            $translatableListener: '@stof_doctrine_extensions.listener.translatable'
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 20 }
            - { name: kernel.event_listener, event: kernel.response, method: onKernelResponse }

    # Translation Completeness Extension (API Platform collection filter)
    PsychedCms\Translatable\Doctrine\TranslationCompletenessExtension: ~

    # Slug fallback: prevent null slugs when Gedmo translatable has no-fallback mode.
    # Two listeners bracket Gedmo's TranslatableListener (postLoad at priority -10):
    PsychedCms\Translatable\EventListener\SlugCaptureListener:
        tags:
            - { name: doctrine.event_listener, event: postLoad, priority: 0 }

    PsychedCms\Translatable\EventListener\SlugFallbackListener:
        arguments:
            $captureListener: '@PsychedCms\Translatable\EventListener\SlugCaptureListener'
        tags:
            - { name: doctrine.event_listener, event: postLoad, priority: -20 }

    # Translated slug item provider (decorates Doctrine default)
    PsychedCms\Translatable\State\TranslatedSlugItemProvider:
        decorates: 'api_platform.doctrine.orm.state.item_provider'
        arguments:
            $decorated: '@.inner'

    # Title-required validator: ensures title/name is present when other fields are translated
    PsychedCms\Translatable\Validator\TranslationTitleRequiredValidator:
        tags:
            - { name: doctrine.event_listener, event: prePersist }
            - { name: doctrine.event_listener, event: preUpdate }
