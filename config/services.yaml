services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Translation Validator
    PsychedCms\Translatable\Translation\TranslationValidator: ~

    # Locale Listener
    PsychedCms\Translatable\EventListener\LocaleListener:
        arguments:
            $translatableListener: '@stof_doctrine_extensions.listener.translatable'
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 20 }
            - { name: kernel.event_listener, event: kernel.response, method: onKernelResponse }

    # Translation Completeness Extension (API Platform collection filter)
    # Disabled: filters out entities without complete translations, which breaks
    # the admin list view when browsing in a non-default locale.
    # Re-enable for public-facing APIs that should only show fully translated content.
    # PsychedCms\Translatable\Doctrine\TranslationCompletenessExtension: ~
